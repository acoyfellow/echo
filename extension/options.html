<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>echo settings</title>
  <style>
    :root { color-scheme: light dark; }
    body { font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; max-width: 480px; margin: 4rem auto; padding: 0 1rem; }
    label { display: block; margin: 1rem 0 .25rem; font-weight: bold; }
    input { width: 100%; padding: .5rem; font: inherit; }
    .help { color: #888; font-size: 12px; margin-top: .25rem; }
    .err { color: #c33; font-size: 12px; margin-top: .5rem; min-height: 1em; }
    .probe { color: #888; font-size: 12px; margin-top: .5rem; min-height: 1em; }
    button { margin-top: 1rem; padding: .5rem 1rem; font: inherit; cursor: pointer; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #eee; }
      input { background: #2a2a2a; color: #eee; border: 1px solid #444; }
    }
  </style>
</head>
<body>
  <h1>echo settings</h1>
  <label for="workerBase">Worker base URL</label>
  <input id="workerBase" type="url" placeholder="https://echo.example.dev or http://127.0.0.1:8870" />
  <p class="help">Point at your own deployed echo Worker, or run locally with <code>bun run dev</code>.</p>
  <div class="err" id="err"></div>
  <div class="probe" id="probe"></div>
  <button id="save">Save</button>
  <script src="options.js"></script>
</body>
</html>
